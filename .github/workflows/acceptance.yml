name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: docker compose up -d --wait
      - run: ./scripts/bootstrap-matomo.sh >> "$GITHUB_ENV"
      - run: go run ./tools/gen
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-tagmanager-resources
          path: internal/provider/generated_*.go
          retention-days: 1
      # TEMPORARY one-time bootstrap: no generated_*.go files are committed
      # yet at all, so there is nothing meaningful for a drift check to
      # compare against. Commit+push the first real generated output
      # directly (this is the only place with live Matomo access), then
      # this step gets replaced back with a pure drift check (see Task 12
      # follow-up) once the committed files exist. GITHUB_TOKEN pushes
      # don't retrigger workflows, so this can't cause a push loop.
      - name: Bootstrap-commit generated Tag Manager resources
        run: |
          git add -A -- 'internal/provider/generated_*.go'
          if ! git diff --cached --quiet -- 'internal/provider/generated_*.go'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Bootstrap: commit initially generated Tag Manager resources"
            git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          fi
      - run: TF_ACC=1 go test ./... -run TestAcc -v -count=1 -timeout 20m
      - if: always()
        run: docker compose down -v
