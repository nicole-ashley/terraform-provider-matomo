name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: docker compose up -d --wait
      - run: ./scripts/bootstrap-matomo.sh >> "$GITHUB_ENV"
      - run: go run ./tools/gen
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-tagmanager-resources
          path: internal/provider/generated_*.go
          retention-days: 1
      # TEMPORARY, again: the ToParams/FromParams signature change to
      # matomo.ParamsMap (fixing lossy comma-joined List-parameter
      # encoding) changed every generated file's content, but this
      # environment has no live Matomo to run tools/gen locally and
      # regenerate the 129 already-committed files that need it - commit
      # the regenerated output directly one more time, then revert back
      # to the pure drift check (matching the same pattern already used
      # several times earlier in this branch's history).
      - name: Bootstrap-commit regenerated Tag Manager resources
        run: |
          git add -A -- 'internal/provider/generated_*.go'
          if ! git diff --cached --quiet -- 'internal/provider/generated_*.go'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Bootstrap: commit regenerated Tag Manager resources"
            git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          fi
      - run: TF_ACC=1 go test ./... -run TestAcc -v -count=1 -timeout 20m
      - if: always()
        run: docker compose down -v
