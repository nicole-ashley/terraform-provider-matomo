name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  acceptance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: docker compose up -d --wait
      - run: ./scripts/bootstrap-matomo.sh >> "$GITHUB_ENV"
      - run: go run ./tools/gen
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-tagmanager-resources
          path: internal/provider/generated_*.go
          retention-days: 1
      # Temporary bootstrap-commit: this branch just wired up tools/gen to
      # also emit examples/resources/<type>/resource.tf for each of the 64
      # generated types (Phase 8a, docs-and-examples plan Task 1), but
      # those 64 files don't exist yet - they can only be produced against
      # a live Matomo instance, which this sandbox doesn't have. This step
      # commits them for real, once; it will be reverted back to a pure
      # drift-check (see plan Task 4 step 4) as soon as that lands.
      - name: Commit generated resources and examples (temporary bootstrap)
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add -A -- 'internal/provider/generated_*.go' 'examples/resources/*'
          git diff --cached --quiet || git commit -m "Regenerate generated resources and examples against live Matomo"
          git push origin HEAD:"${{ github.head_ref || github.ref_name }}"
      - run: TF_ACC=1 go test ./... -run TestAcc -v -count=1 -timeout 20m
      - if: always()
        run: docker compose down -v
