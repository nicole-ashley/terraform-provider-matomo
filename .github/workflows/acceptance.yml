name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: docker compose up -d --wait
      - run: ./scripts/bootstrap-matomo.sh >> "$GITHUB_ENV"
      - run: go run ./tools/gen
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-tagmanager-resources
          path: internal/provider/generated_*.go
          retention-days: 1
      # Drift check: the generated resources and examples committed to the
      # repo must match what tools/gen produces against the live Matomo
      # instance right now. If this fails, someone edited a generated
      # file by hand, or a codegen change wasn't followed by a real
      # regeneration + commit (the bootstrap-commit pattern used earlier
      # in this branch's history, temporarily, whenever that happened).
      - name: Fail if generated resources or examples have drifted
        run: |
          git add -A -- 'internal/provider/generated_*.go' 'examples/resources/*'
          git diff --cached --exit-code -- 'internal/provider/generated_*.go' 'examples/resources/*'
      - run: TF_ACC=1 go test ./... -run TestAcc -v -count=1 -timeout 20m
      - if: always()
        run: docker compose down -v
