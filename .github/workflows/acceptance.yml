name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: docker compose up -d --wait
      - run: ./scripts/bootstrap-matomo.sh >> "$GITHUB_ENV"
      - name: Regenerate typed Tag Manager resources and check for drift
        run: |
          go run ./tools/gen
          git add -A -- 'internal/provider/generated_*.go'
          if ! git diff --cached --exit-code -- 'internal/provider/generated_*.go'; then
            echo "::error::generated Tag Manager resources are out of date. Run 'go run ./tools/gen' locally (against a Matomo instance) and commit the result." >&2
            exit 1
          fi
      - run: TF_ACC=1 go test ./... -run TestAcc -v -count=1 -timeout 20m
      - if: always()
        run: docker compose down -v
